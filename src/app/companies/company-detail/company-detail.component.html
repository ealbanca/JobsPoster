<div class="row" style="align-items: center;">
    <div class="col-xs-8">
        <img [src]="company.logoUrl"
            alt="{{company.name}}"
            class="img-responsive"
            style="max-height: 300px;">
    </div>
    <div class="col-xs-4 text-right">
        <div class="btn-group" appDropdown>
            <button type="button" class="btn btn-primary dropdown-toggle">
                Manage Company<span class="caret"></span>
            </button>
            <ul class="dropdown-menu">
                <li><a style="cursor: pointer;" (click)="onEditCompany()">Edit Company</a></li>
                <li><a style="cursor: pointer;" (click)="onDeleteCompany()">Delete Company</a></li>
            </ul>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        <h1><strong>{{company.name}}</strong></h1>
    </div>
</div>
<div class="row" style="margin-bottom: 2.5rem;">
    <div class="col-xs-12">
        <a [href]="company.websiteUrl" target="_blank"><h4 style="margin-top: 0; margin-bottom: 0.5rem;">{{company.websiteUrl}}</h4></a>
    </div>
</div>
<div class="row" style="margin-top: 2rem; margin-bottom: 2rem;">
    <div class="col-xs-12">
        {{company.description}}
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        <ul class="list-group jobs-table">
            <li 
            class="list-group-item" 
            *ngFor="let job of company.jobs">
                <strong>{{ job.title }}</strong> ({{ job.location }}) {{job.salary | currency:'USD':true:'1.0-0' }}
            </li>
        </ul>
    </div>
</div>
