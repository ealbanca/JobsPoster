<div class="panel panel-default">
  <div class="panel-heading">
    <div class="row pad-left-right">
      <span class="pull-left title">Companies</span>
      <a routerLink="/companies/new" class="btn btn-success pull-right">Add Company</a>
    </div>
  </div>
  <div class="panel-body">
    <div class="center-panel">
      <app-company-item
        *ngFor="let company of companies"
        [company]="company">
      </app-company-item>
    </div>
  </div>

</div>
