<a  
    style="cursor: pointer;"
    routerLink="/companies/{{company.id}}"
    routerLinkActive="active"
    class="list-group-item clearfix"
    (click)="onSelected()">
    <div class="pull-left">
        <h4 class="list-group-item-heading">{{company.name}}</h4>
    </div>
    <span class="pull-right">
        <img [src]="company.logoUrl" alt="{{company.name}}" class="img-responsive" style="max-height: 50px;">
    </span>
</a>
