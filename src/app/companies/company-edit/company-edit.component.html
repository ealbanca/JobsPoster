<div class="row">
    <div class="col-xs-12">
        <form id="company-edit" #f="ngForm" (ngSubmit)="onSubmit(f)">
            <div class="row">
                <div class="col-xs-12">
                    <button 
                    type="submit" 
                    class="btn btn-success"
                    [disabled]="!f.valid">Save</button>
                    <button 
                    type="button" 
                    class="btn btn-danger" (click)="onCancel()">Cancel</button>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="name">Name</label>
                            <input 
                            type="text" 
                            id="name"
                            name="name"
                            [(ngModel)]="company.name"
                            class="form-control">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="logoUrl">Image URL</label>
                            <input 
                            type="text" 
                            id="logoUrl"
                            name="logoUrl"
                            [(ngModel)]="company.logoUrl"
                            class="form-control"
                            #imagePath>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <img [src]="imagePath.value" class="img-responsive">
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="websiteUrl">Website URL</label>
                        <input 
                        type="text"
                        id="websiteUrl"
                        name="websiteUrl"
                            [(ngModel)]="company.websiteUrl"
                            class="form-control">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea 
                        type="text"
                        id="description"
                        name="description"
                            [(ngModel)]="company.description"
                            class="form-control"
                            rows="6"></textarea>
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-12">
                    <div 
                    class="row"
                    *ngFor="let job of company.jobs; let i = index"
                    style="margin-top: 10px;">
                        <div class="col-xs-8">
                            <input 
                                type="text" 
                                class="form-control" 
                                [value]="job.title" 
                                placeholder="Job Title" 
                                readonly>
                        </div>
                        <div class="col-xs-2">
                            <button
                            type="button"   
                            class="btn btn-danger"
                            (click)="onDeleteJob(i)">X</button>
                        </div>
                    </div>
                    <hr>
                </div>
            </div>
        </form>
    </div>
</div>
